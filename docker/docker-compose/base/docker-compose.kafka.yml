x-kafka-broker-env: &kafka-broker-env
  CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: "${KAFKA_CONTROLLER_QUORUM_VOTERS:-1@kafka1:29093,2@kafka2:29093,3@kafka3:29093}"
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  # librdkafka may exceed its client-side message.max.bytes by one record when
  # closing a record batch. Keep broker headroom above HAMSTRING's 900 KB
  # application payload ceiling so a valid payload cannot poison a transaction.
  KAFKA_MESSAGE_MAX_BYTES: "${KAFKA_BROKER_MAX_RECORD_BYTES:-2097152}"
  KAFKA_REPLICA_FETCH_MAX_BYTES: "${KAFKA_BROKER_MAX_RECORD_BYTES:-2097152}"
  # Retention is evaluated only for closed log segments.  Keep the segment
  # smaller and roll it frequently so that the four-hour retention period is
  # effective even for low-volume partitions.
  #
  # log.retention.bytes applies to *each partition replica*, not to the broker.
  # With 12 partitions and replication factor 3, a 10 GiB value can consume
  # tens of GiB across the three broker volumes.
  KAFKA_LOG_RETENTION_HOURS: "${KAFKA_LOG_RETENTION_HOURS:-4}"
  KAFKA_LOG_RETENTION_BYTES: "${KAFKA_LOG_RETENTION_BYTES:-16777216}"
  KAFKA_LOG_SEGMENT_BYTES: "${KAFKA_LOG_SEGMENT_BYTES:-4194304}"
  KAFKA_LOG_SEGMENT_MS: "${KAFKA_LOG_SEGMENT_MS:-900000}"
  KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "${KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS:-300000}"
  KAFKA_LOG_CLEANUP_POLICY: "${KAFKA_LOG_CLEANUP_POLICY:-delete}"

x-kafka-healthcheck: &kafka-healthcheck
  interval: 15s
  timeout: 20s
  retries: 5
  start_period: 60s
  start_interval: 5s

services:
  kafka1:
    image: "${KAFKA_IMAGE_REPOSITORY:-confluentinc/cp-kafka}:${KAFKA_IMAGE_TAG:-8.2.2}"
    container_name: kafka1
    restart: "unless-stopped"
    networks:
      - hamstring
    ports:
      - "8097:8097"
    healthcheck:
      <<: *kafka-healthcheck
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:19092 >/dev/null 2>&1"]
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:19092,EXTERNAL://${HOST_IP:-localhost}:8097
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:8097,CONTROLLER://0.0.0.0:29093
    volumes:
      - kafka-broker-data1:/var/lib/kafka/data

  kafka2:
    image: "${KAFKA_IMAGE_REPOSITORY:-confluentinc/cp-kafka}:${KAFKA_IMAGE_TAG:-8.2.2}"
    container_name: kafka2
    restart: "unless-stopped"
    networks:
      - hamstring
    ports:
      - "8098:8098"
    healthcheck:
      <<: *kafka-healthcheck
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:19093 >/dev/null 2>&1"]
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:19093,EXTERNAL://${HOST_IP:-localhost}:8098
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19093,EXTERNAL://0.0.0.0:8098,CONTROLLER://0.0.0.0:29093
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
    volumes:
      - kafka-broker-data2:/var/lib/kafka/data

  kafka3:
    image: "${KAFKA_IMAGE_REPOSITORY:-confluentinc/cp-kafka}:${KAFKA_IMAGE_TAG:-8.2.2}"
    container_name: kafka3
    restart: "unless-stopped"
    networks:
      - hamstring
    ports:
      - "8099:8099"
    healthcheck:
      <<: *kafka-healthcheck
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:19094 >/dev/null 2>&1"]
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:19094,EXTERNAL://${HOST_IP:-localhost}:8099
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19094,EXTERNAL://0.0.0.0:8099,CONTROLLER://0.0.0.0:29093
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
    volumes:
      - kafka-broker-data3:/var/lib/kafka/data

networks:
  hamstring:
    external: true

volumes:
  kafka-broker-data1:
  kafka-broker-data2:
  kafka-broker-data3:
