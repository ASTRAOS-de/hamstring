# Compose file to deploy directly with docker stack deploy.
---
x-kafka-broker-env: &kafka-broker-env
  CLUSTER_ID: "${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}"
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: "${KAFKA_CONTROLLER_QUORUM_VOTERS:-1@kafka1:29093,2@kafka2:29093,3@kafka3:29093}"
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
  KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-false}"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:-3}"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:-2}"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-3}"
  # Retention applies only to closed segments and retention.bytes is per
  # partition replica.  Frequent, small segments make the retention window
  # effective and keep the replicated pipeline topics bounded on disk.
  KAFKA_LOG_RETENTION_HOURS: "${KAFKA_LOG_RETENTION_HOURS:-4}"
  KAFKA_LOG_RETENTION_BYTES: "${KAFKA_LOG_RETENTION_BYTES:-16777216}"
  KAFKA_LOG_SEGMENT_BYTES: "${KAFKA_LOG_SEGMENT_BYTES:-4194304}"
  KAFKA_LOG_SEGMENT_MS: "${KAFKA_LOG_SEGMENT_MS:-900000}"
  KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: "${KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS:-300000}"
  KAFKA_LOG_CLEANUP_POLICY: "${KAFKA_LOG_CLEANUP_POLICY:-delete}"

x-hamstring-kafka-wait-env: &hamstring-kafka-wait-env
  HAMSTRING_WAIT_FOR: kafka
  HAMSTRING_WAIT_INITIAL_DELAY_SECONDS: "${HAMSTRING_WAIT_INITIAL_DELAY_SECONDS:-30}"
  HAMSTRING_WAIT_TIMEOUT_SECONDS: "${HAMSTRING_WAIT_TIMEOUT_SECONDS:-180}"

x-hamstring-kafka-clickhouse-wait-env: &hamstring-kafka-clickhouse-wait-env
  HAMSTRING_WAIT_FOR: kafka,clickhouse
  HAMSTRING_WAIT_INITIAL_DELAY_SECONDS: "${HAMSTRING_WAIT_INITIAL_DELAY_SECONDS:-30}"
  HAMSTRING_WAIT_TIMEOUT_SECONDS: "${HAMSTRING_WAIT_TIMEOUT_SECONDS:-180}"

services:
  kafka1:
    image: "${KAFKA_IMAGE_REPOSITORY:-confluentinc/cp-kafka}:${KAFKA_IMAGE_TAG:-8.2.2}"
    networks: [hamstring]
    ports:
      - target: 8097
        published: "${KAFKA1_EXTERNAL_PORT:-8097}"
        protocol: tcp
        mode: ingress
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: "1"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka1:19092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA1_EXTERNAL_PORT:-8097}"
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:8097,CONTROLLER://0.0.0.0:29093
    volumes:
      - kafka-broker-data1:/var/lib/kafka/data
    deploy:
      placement:
        constraints:
          - "${KAFKA1_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  kafka2:
    image: "${KAFKA_IMAGE_REPOSITORY:-confluentinc/cp-kafka}:${KAFKA_IMAGE_TAG:-8.2.2}"
    networks: [hamstring]
    ports:
      - target: 8098
        published: "${KAFKA2_EXTERNAL_PORT:-8098}"
        protocol: tcp
        mode: ingress
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: "2"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka2:19093,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA2_EXTERNAL_PORT:-8098}"
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19093,EXTERNAL://0.0.0.0:8098,CONTROLLER://0.0.0.0:29093
      KAFKA_LOG4J_LOGGERS: "${KAFKA_LOG4J_LOGGERS:-kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO}"
    volumes:
      - kafka-broker-data2:/var/lib/kafka/data
    deploy:
      placement:
        constraints:
          - "${KAFKA2_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  kafka3:
    image: "${KAFKA_IMAGE_REPOSITORY:-confluentinc/cp-kafka}:${KAFKA_IMAGE_TAG:-8.2.2}"
    networks: [hamstring]
    ports:
      - target: 8099
        published: "${KAFKA3_EXTERNAL_PORT:-8099}"
        protocol: tcp
        mode: ingress
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: "3"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka3:19094,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA3_EXTERNAL_PORT:-8099}"
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19094,EXTERNAL://0.0.0.0:8099,CONTROLLER://0.0.0.0:29093
      KAFKA_LOG4J_LOGGERS: "${KAFKA_LOG4J_LOGGERS:-kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO}"
    volumes:
      - kafka-broker-data3:/var/lib/kafka/data
    deploy:
      placement:
        constraints:
          - "${KAFKA3_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  clickhouse-server:
    image: "${CLICKHOUSE_IMAGE_REPOSITORY:-clickhouse/clickhouse-server}:${CLICKHOUSE_IMAGE_TAG:-26.5-alpine}"
    networks:
      - hamstring
    environment:
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-hamstring}"
    ports:
      - target: 8123
        published: "${CLICKHOUSE_HTTP_PORT:-8123}"
        protocol: tcp
        mode: ingress
      - target: 9000
        published: "${CLICKHOUSE_NATIVE_PORT:-9000}"
        protocol: tcp
        mode: ingress
    volumes:
      - "${HAMSTRING_ROOT:-../..}/docker/create_tables:/docker-entrypoint-initdb.d"
      - "${HAMSTRING_ROOT:-../..}/docker/clickhouse/config.d/retention.xml:/etc/clickhouse-server/config.d/retention.xml:ro"
      - ch_data:/var/lib/clickhouse/
      - ch_logs:/var/log/clickhouse-server/
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8123"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      placement:
        constraints:
          - "${CLICKHOUSE_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  grafana:
    image: "${GRAFANA_IMAGE_REPOSITORY:-grafana/grafana}:${GRAFANA_IMAGE_TAG:-13.0.3-slim}"
    networks:
      - hamstring
    ports:
      - target: 3000
        published: "${GRAFANA_PORT:-3000}"
        protocol: tcp
        mode: ingress
    volumes:
      - "${HAMSTRING_ROOT:-../..}/docker/grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards"
      - "${HAMSTRING_ROOT:-../..}/docker/grafana-provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml"
      - "${HAMSTRING_ROOT:-../..}/docker/grafana-provisioning/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_INSTALL_PLUGINS: "${GRAFANA_INSTALL_PLUGINS:-grafana-clickhouse-datasource}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-hamstring}"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000"]
      interval: 10s
      timeout: 30s
      start_period: 120s
      retries: 3
    deploy:
      placement:
        constraints:
          - "${GRAFANA_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  prometheus:
    image: "${PROMETHEUS_IMAGE_REPOSITORY:-prom/prometheus}:${PROMETHEUS_IMAGE_TAG:-latest}"
    networks:
      - hamstring
    ports:
      - target: 9090
        published: "${PROMETHEUS_PORT:-9088}"
        protocol: tcp
        mode: ingress
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
        mode: 0444
    deploy:
      placement:
        constraints:
          - "${PROMETHEUS_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  kafka-exporter:
    image: "${KAFKA_EXPORTER_IMAGE_REPOSITORY:-danielqsj/kafka-exporter}:${KAFKA_EXPORTER_IMAGE_TAG:-latest}"
    command:
      - --kafka.server=kafka1:19092
      - --kafka.server=kafka2:19093
      - --kafka.server=kafka3:19094
    networks:
      - hamstring
    ports:
      - target: 9308
        published: "${KAFKA_EXPORTER_PORT:-9308}"
        protocol: tcp
        mode: ingress
    deploy:
      placement:
        constraints:
          - "${KAFKA_EXPORTER_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  monitoring_agent:
    image: "${HAMSTRING_IMAGE_REGISTRY:-ghcr.io/astraos-de}/hamstring-monitoring:${HAMSTRING_MONITORING_IMAGE_TAG:-v2.3.0}"
    command: ["src/monitoring/monitoring_agent.py"]
    networks:
      - hamstring
    volumes:
      - "${HAMSTRING_ROOT:-../..}/config.yaml:/app/config.yaml"
    environment:
      <<: *hamstring-kafka-clickhouse-wait-env
      GROUP_ID: "${MONITORING_AGENT_GROUP_ID:-monitoring_agent}"
      HAMSTRING_CONFIG_CHECKSUM: "${HAMSTRING_CONFIG_CHECKSUM:-d9bc812b76c2b58c633b412a6c07f981f3c4d787}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-hamstring}"
    deploy:
      placement:
        constraints:
          - "${MONITORING_AGENT_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  logserver:
    image: "${HAMSTRING_IMAGE_REGISTRY:-ghcr.io/astraos-de}/hamstring-logserver:${HAMSTRING_LOGSERVER_IMAGE_TAG:-v2.3.0}"
    command: ["src/logserver/server.py"]
    networks:
      - hamstring
    volumes:
      - "${LOGSERVER_INPUT_PATH:-../../docker/default_input}:/opt/file.txt:ro"
      - "${HAMSTRING_ROOT:-../..}/config.yaml:/app/config.yaml"
    environment:
      <<: *hamstring-kafka-wait-env
      GROUP_ID: "${LOGSERVER_GROUP_ID:-log_storage}"
      HAMSTRING_CONFIG_CHECKSUM: "${HAMSTRING_CONFIG_CHECKSUM:-d9bc812b76c2b58c633b412a6c07f981f3c4d787}"
    deploy:
      mode: replicated
      replicas: ${LOGSERVER_REPLICAS:-1}
      placement:
        constraints:
          - "${LOGSERVER_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  logcollector:
    image: "${HAMSTRING_IMAGE_REGISTRY:-ghcr.io/astraos-de}/hamstring-logcollector:${HAMSTRING_LOGCOLLECTOR_IMAGE_TAG:-v2.3.0}"
    command: ["src/logcollector/collector.py"]
    networks:
      - hamstring
    volumes:
      - "${HAMSTRING_ROOT:-../..}/config.yaml:/app/config.yaml"
    environment:
      <<: *hamstring-kafka-wait-env
      GROUP_ID: "${LOGCOLLECTOR_GROUP_ID:-log_collection}"
      HAMSTRING_CONFIG_CHECKSUM: "${HAMSTRING_CONFIG_CHECKSUM:-d9bc812b76c2b58c633b412a6c07f981f3c4d787}"
    deploy:
      mode: replicated
      replicas: ${LOGCOLLECTOR_REPLICAS:-1}
      placement:
        constraints:
          - "${LOGCOLLECTOR_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  prefilter:
    image: "${HAMSTRING_IMAGE_REGISTRY:-ghcr.io/astraos-de}/hamstring-prefilter:${HAMSTRING_PREFILTER_IMAGE_TAG:-v2.3.0}"
    command: ["src/prefilter/prefilter.py"]
    networks:
      - hamstring
    volumes:
      - "${HAMSTRING_ROOT:-../..}/config.yaml:/app/config.yaml"
    environment:
      <<: *hamstring-kafka-wait-env
      GROUP_ID: "${PREFILTER_GROUP_ID:-log_filtering}"
      HAMSTRING_CONFIG_CHECKSUM: "${HAMSTRING_CONFIG_CHECKSUM:-d9bc812b76c2b58c633b412a6c07f981f3c4d787}"
    deploy:
      mode: replicated
      replicas: ${PREFILTER_REPLICAS:-1}
      placement:
        constraints:
          - "${PREFILTER_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  inspector:
    image: "${HAMSTRING_IMAGE_REGISTRY:-ghcr.io/astraos-de}/hamstring-inspector:${HAMSTRING_INSPECTOR_IMAGE_TAG:-v2.3.0}"
    command: ["src/inspector/inspector.py"]
    networks:
      - hamstring
    volumes:
      - "${HAMSTRING_ROOT:-../..}/config.yaml:/app/config.yaml"
    environment:
      <<: *hamstring-kafka-wait-env
      GROUP_ID: "${INSPECTOR_GROUP_ID:-data_inspection}"
      NUMBER_OF_INSTANCES: "${INSPECTOR_NUMBER_OF_INSTANCES:-1}"
      HAMSTRING_CONFIG_CHECKSUM: "${HAMSTRING_CONFIG_CHECKSUM:-d9bc812b76c2b58c633b412a6c07f981f3c4d787}"
    deploy:
      mode: replicated
      replicas: ${INSPECTOR_REPLICAS:-1}
      resources:
        limits:
          cpus: "${INSPECTOR_CPU_LIMIT:-2}"
          memory: "${INSPECTOR_MEMORY_LIMIT:-512M}"
        reservations:
          cpus: "${INSPECTOR_CPU_RESERVATION:-1}"
          memory: "${INSPECTOR_MEMORY_RESERVATION:-256M}"
      placement:
        constraints:
          - "${INSPECTOR_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  detector:
    image: "${HAMSTRING_IMAGE_REGISTRY:-ghcr.io/astraos-de}/hamstring-detector:${HAMSTRING_DETECTOR_IMAGE_TAG:-v2.3.0}"
    command: ["src/detector/detector.py"]
    networks:
      - hamstring
    volumes:
      - "${HAMSTRING_ROOT:-../..}/config.yaml:/app/config.yaml"
    environment:
      <<: *hamstring-kafka-wait-env
      GROUP_ID: "${DETECTOR_GROUP_ID:-data_analysis}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      HAMSTRING_CONFIG_CHECKSUM: "${HAMSTRING_CONFIG_CHECKSUM:-d9bc812b76c2b58c633b412a6c07f981f3c4d787}"
    deploy:
      mode: replicated
      replicas: ${DETECTOR_REPLICAS:-1}
      # Use when nvidia gpu is available to you
      # resources:
      #   reservations:
      #     generic_resources:
      #       - discrete_resource_spec:
      #           kind: NVIDIA-GPU
      #           value: 1
      placement:
        constraints:
          - "${DETECTOR_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

  alerter:
    image: "${HAMSTRING_IMAGE_REGISTRY:-ghcr.io/astraos-de}/hamstring-alerter:${HAMSTRING_ALERTER_IMAGE_TAG:-v2.3.0}"
    command: ["src/alerter/alerter.py"]
    networks:
      - hamstring
    volumes:
      - "${HAMSTRING_ROOT:-../..}/config.yaml:/app/config.yaml"
      - alerter_logs:/opt/logs
    environment:
      <<: *hamstring-kafka-wait-env
      GROUP_ID: "${ALERTER_GROUP_ID:-data_alerting}"
      HAMSTRING_CONFIG_CHECKSUM: "${HAMSTRING_CONFIG_CHECKSUM:-d9bc812b76c2b58c633b412a6c07f981f3c4d787}"
    deploy:
      mode: replicated
      replicas: ${ALERTER_REPLICAS:-1}
      placement:
        constraints:
          - "${ALERTER_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any
  zeek:
    image: "${HAMSTRING_IMAGE_REGISTRY:-ghcr.io/astraos-de}/hamstring-zeek:${HAMSTRING_ZEEK_IMAGE_TAG:-2.0.4}"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - host
    volumes:
      - "${HAMSTRING_ROOT:-../..}/config.yaml:/opt/config.yaml"
      - "${HAMSTRING_ROOT:-../..}/docker/data/test_pcaps:/opt/static_files"
    environment:
      # Kafka endpoints for host-networked Zeek come from config.yaml:
      # environment.kafka_brokers[*].node_ip/external_port.
      CONTAINER_NAME: "${ZEEK_CONTAINER_NAME:-zeek}"
      HAMSTRING_ZEEK_KAFKA_WAIT_INTERVAL_SECONDS: "${HAMSTRING_ZEEK_KAFKA_WAIT_INTERVAL_SECONDS:-5}"
    deploy:
      mode: replicated
      replicas: ${ZEEK_REPLICAS:-1}
      placement:
        constraints:
          - "${ZEEK_PLACEMENT_CONSTRAINT:-node.platform.os == linux}"
      restart_policy:
        condition: any

networks:
  host:
    external: true
    name: host
  hamstring:
    driver: overlay
    attachable: true

volumes:
  alerter_logs:
  ch_data:
  ch_logs:
  kafka-broker-data1:
  kafka-broker-data2:
  kafka-broker-data3:

configs:
  prometheus_config:
    file: "${PROMETHEUS_CONFIG_FILE:-../../docker/prometheus/prometheus.yml}"

# code: language=yaml
