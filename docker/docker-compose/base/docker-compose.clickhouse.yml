services:
  clickhouse-server:
    image: "${CLICKHOUSE_IMAGE_REPOSITORY:-clickhouse/clickhouse-server}:${CLICKHOUSE_IMAGE_TAG:-26.5-alpine}"
    container_name: clickhouse-server
    volumes:
      - ../../create_tables:/docker-entrypoint-initdb.d
      - ../../clickhouse/config.d/retention.xml:/etc/clickhouse-server/config.d/retention.xml:ro
      - ch_data:/var/lib/clickhouse/
      - ch_logs:/var/log/clickhouse-server/
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-hamstring}
    networks:
      - hamstring
    restart: "unless-stopped"
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1:8123/ping | grep -q 'Ok.'" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
      start_interval: 2s
